# 운영 환경 설정
server:
  port: 80

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://prod-db-server:5432/discodeit
    username: ${DB_USERNAME:discodeit_user}  # 환경변수 활용
    password: ${DB_PASSWORD:discodeit1234}

# 운영 환경 로깅 설정
logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn
    com.sprint.mission.discodeit: info  # 프로젝트 패키지는 info 레벨

management:
  server:
    port: 8080  # 운영환경은 같은 포트 사용
  endpoints:
    web:
      exposure:
        include: health,info,metrics  # 운영환경에서는 loggers 제외